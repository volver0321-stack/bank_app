<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Bank Account Has Been Created</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 32px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        h2 {
            margin-top: 0;
            color: #111827;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
        }

        .details {
            margin: 24px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .row:last-child {
            border-bottom: 0;
        }

        .label {
            color: #6b7280;
            font-size: 14px;
        }

        .value {
            font-weight: bold;
            text-align: right;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="container">
    <h2><span th:text="${name}">User</span>さんの口座が作成されました</h2>

    <p>
        Bank Appのご利用ありがとうございます。
        新しい銀行口座の作成が完了しました。
    </p>

    <div class="details">
        <div class="row">
            <span class="label">口座番号</span>
            <span class="value" th:text="${accountNumber}">0000000000</span>
        </div>
        <div class="row">
            <span class="label">口座タイプ</span>
            <span class="value" th:text="${accountType}">SAVINGS</span>
        </div>
        <div class="row">
            <span class="label">通貨</span>
            <span class="value" th:text="${currency}">USD</span>
        </div>
    </div>

    <p>
        ログイン後、口座情報や取引履歴を確認できます。
    </p>

    <div class="footer">
        <p>このメールは自動送信されています。</p>
        <p>&copy; 2026 Bank App</p>
    </div>
</div>
</body>
</html>
