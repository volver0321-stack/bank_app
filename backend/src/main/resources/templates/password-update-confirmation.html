<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Updated Successfully</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 32px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        h2 {
            margin-top: 0;
            color: #111827;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
        }

        .notice {
            margin: 24px 0;
            padding: 14px 16px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            color: #4b5563;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="container">
    <h2><span th:text="${name}">User</span>さん、パスワードを更新しました</h2>

    <p>
        Bank Appアカウントのパスワード変更が完了しました。
    </p>

    <div class="footer">
        <p>このメールは自動送信されています。</p>
        <p>&copy; 2026 Bank App</p>
    </div>
</div>
</body>
</html>
