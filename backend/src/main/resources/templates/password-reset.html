<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 32px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        h2 {
            margin-top: 0;
            color: #111827;
            font-size: 24px;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
        }

        .button {
            display: inline-block;
            margin: 16px 0 20px;
            padding: 13px 22px;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
        }

        .link-box {
            margin-top: 8px;
            padding: 14px 16px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            word-break: break-all;
            font-size: 13px;
            color: #374151;
        }

        .link-box a {
            color: #2563eb;
        }

        .notice {
            margin-top: 24px;
            padding: 14px 16px;
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            font-size: 14px;
            color: #92400e;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>
        パスワード再設定のご案内
    </h2>

    <p>
        <span th:text="${name}">ユーザー</span> さん
    </p>

    <p>
        Bank App のパスワード再設定リクエストを受け付けました。
        下のボタンから新しいパスワードを設定してください。
    </p>

    <a class="button" th:href="${resetLink}" href="http://localhost:3000/reset-password?code=sample-code">
        パスワードを再設定する
    </a>

    <p>ボタンが開けない場合は、以下のリンクをブラウザに貼り付けてください。</p>


    <div class="notice">
        このリンクの有効期限は 60 分です。
        このメールに心当たりがない場合は、何も操作せず破棄してください。
    </div>

    <hr>

    <div class="footer">
        <p>このメールは自動送信されています。</p>
        <p>&copy; 2026 Bank App</p>
    </div>

</div>

</body>
</html>
