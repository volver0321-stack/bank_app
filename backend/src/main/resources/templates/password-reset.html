<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード変更完了</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 32px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        h2 {
            margin-top: 0;
            color: #111827;
            font-size: 24px;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
        }

        .notice {
            margin-top: 24px;
            padding: 14px 16px;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            font-size: 14px;
            color: #b91c1c;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>
        パスワード変更完了
    </h2>

    <p>
        <span th:text="${name}">ユーザー</span> さん
    </p>

    <p>
        パスワードの変更が完了しました。
    </p>

    <p>
        ご自身で変更された場合は、特に対応の必要はありません。
    </p>

    <div class="notice">
        この変更に心当たりがない場合は、
        速やかにサポートへお問い合わせください。
    </div>

    <hr>

    <div class="footer">
        <p>このメールは自動送信されています。</p>
        <p>&copy; 2026 Bank App</p>
    </div>

</div>

</body>
</html>
